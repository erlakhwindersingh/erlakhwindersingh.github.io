A potential support for use in trickling biofilters is polyurethane foam. This material has many advantages for biological growth including a large surface area for microbial growth, low bulk density, high structural strength, and high porosity [2]. It is important to noted that there is no much publication focused to the physical, chemical, and biological surface modification and their effect to direct use on the polyurethane for biofilm support and gas separation, therefore this research intends to partially address that research gap [3,4,8].

This research aims to investigate the performance of modifying polyurethane foam (PUR) by functionalization with acrylic acid (AcA), as packing material for nitrifying trickling filters (NTF) for removing high concentration of ammonia at a short residence time. In addition, the surface hydrophilicity and microscopic structure modification by surface functionalization were studied.
