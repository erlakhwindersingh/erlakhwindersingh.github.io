<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Er. Lakhwinder Singh - Portfolio</title>
    <style>
        /* ==========================================
           CUSTOM FONTS: Loading external font files
           ========================================== */
        @font-face {
            font-family: 'Poppins-Regular';
            src: url('Poppins-Regular.ttf') format('truetype');
        }

        @font-face {
            font-family: 'Poppins-SemiBold';
            src: url('Poppins-SemiBold.ttf') format('truetype');
        }

        /* Animation: Makes the hexagon image shake smoothly */
        @keyframes slowShake {
            0% { transform: rotate(0deg); }
            20% { transform: rotate(1deg); }
            40% { transform: rotate(-1deg); }
            60% { transform: rotate(1deg); }
            80% { transform: rotate(-1deg); }
            100% { transform: rotate(0deg); }
        }

        /* Animations: Moving glowing orbs in the background */
        @keyframes floatOrb1 {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(40vw, 30vh) scale(1.3); }
            100% { transform: translate(10vw, 60vh) scale(0.9); }
        }

        @keyframes floatOrb2 {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(-40vw, -30vh) scale(1.2); }
            100% { transform: translate(-10vw, -70vh) scale(1.4); }
        }

        /* Animation: Smooth color shifting for background */
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* General Reset: Removing default browser margins/paddings */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        /* ==========================================
           TEXT SELECTION COLOR: Highlight color when user selects text
           ========================================== */
        ::selection {
            background-color: #00f6ff; 
            color: #1a1d24; 
        }
        ::-moz-selection {
            background-color: #00f6ff;
            color: #1a1d24;
        }

        /* Applying specific fonts to headings and logo */
        h1, h2, h3, h4, h5, h6, .logo {
            font-family: 'Poppins-SemiBold', sans-serif;
        }

        /* Styling the main body and background gradient */
        body {
            font-family: 'Poppins-Regular', sans-serif;
            background-color: #080c13; 
            
            /* Lighter vibrant undertones */
            background: linear-gradient(
                -45deg, 
                #080c13 0%, 
                #0f3b4d 25%, 
                #080c13 50%, 
                #144a66 75%, 
                #080c13 100%
            );
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;

            color: #ffffff;
            line-height: 1.6;
            overflow-x: hidden;
            position: relative;
            z-index: 0;
        }

        /* ==========================================
           BRIGHT BACKGROUND ORBS: Visual effects styling
           ========================================== */
        body::before, body::after {
            content: '';
            position: fixed;
            width: 650px;
            height: 650px;
            border-radius: 50%;
            filter: blur(140px); 
            z-index: -1;
            pointer-events: none; 
            opacity: 0.45; 
        }

        body::before {
            background: #00f6ff; 
            top: -10%;
            left: -10%;
            animation: floatOrb1 20s infinite alternate ease-in-out;
        }

        body::after {
            background: #00aaff; 
            bottom: -10%;
            right: -10%;
            animation: floatOrb2 25s infinite alternate-reverse ease-in-out;
        }

        /* Navigation Menu styling */
        nav {
            position: fixed; top: 0; left: 0; width: 100%;
            background: rgba(10, 15, 25, 0.65); 
            backdrop-filter: blur(25px) saturate(120%); 
            -webkit-backdrop-filter: blur(25px) saturate(120%);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1); 
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            padding: 20px 10%; 
            display: flex; justify-content: space-between; align-items: center;
            z-index: 1000; 
        }

        /* FIXED LOGO CSS */
        nav .logo { 
            font-size: 2.2em;  
            font-weight: 800;  
            color: #ffffff;  
            letter-spacing: 1px; 
            text-shadow: 0 4px 15px rgba(0,0,0,0.5); 
            transition: all 0.3s ease; 
            cursor: pointer; 
            user-select: none;
        }
        nav .logo:hover {
            transform: scale(1.05); 
        }
        nav .logo span {  
            color: #00f6ff;    
            text-shadow: 0 0 15px rgba(0, 246, 255, 0.6);
        }
        
        nav ul { list-style: none; display: flex; gap: 15px; } 
        
        nav ul li a { 
            color: #e2e8f0; 
            text-decoration: none; 
            font-weight: 500; 
            font-size: 1em; 
            transition: all 0.3s ease; 
            padding: 8px 20px; 
            border-radius: 30px; 
        }
        
        nav ul li a:hover, nav ul li a.active { 
            background: #00f6ff; 
            color: #ffffff; 
            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.5); 
            box-shadow: 0 4px 15px rgba(0, 246, 255, 0.3); 
        }

        /* First section (Home/Hero) layout */
        #home {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 120px 10% 60px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .hero-content {
            flex: 1;
            max-width: 600px;
        }
        
        .hero-content h3 { font-size: 1.5em; font-weight: 500; margin-bottom: 5px; text-shadow: 0 4px 15px rgba(0,0,0,0.8); }
        .hero-content h1 { font-size: 3.5em; font-weight: 800; margin-bottom: 5px; line-height: 1.1; text-shadow: 0 4px 20px rgba(0,0,0,0.9); }
        .hero-content h2 { font-size: 1.8em; font-weight: 600; margin-bottom: 20px; text-shadow: 0 4px 15px rgba(0,0,0,0.8); }
        .hero-content h2 span { color: #00f6ff; }
        
        .hero-text-box {
            background: rgba(10, 15, 25, 0.4);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .hero-text-box p { color: #cbd5e1; font-size: 1.1em; line-height: 1.7; margin-bottom: 15px; text-shadow: 0 2px 5px rgba(0,0,0,0.8); }
        .hero-text-box p:last-child { margin-bottom: 0; }

        /* General Button Styling */
        .header-buttons { display: flex; flex-wrap: wrap; gap: 15px; position: relative; }
        .btn { display: inline-flex; align-items: center; justify-content: center; gap: 10px; padding: 12px 30px; border-radius: 30px; text-decoration: none; font-weight: 600; transition: all 0.3s ease; }
        
        .btn-primary { 
            background: #00f6ff; color: #1a1d24; 
            box-shadow: 0 0 20px rgba(0, 246, 255, 0.5); 
        }
        .btn-primary:hover { box-shadow: 0 0 35px rgba(0, 246, 255, 0.8); transform: translateY(-3px); }
        
        .btn-outline { 
            background: rgba(10, 15, 25, 0.6);
            backdrop-filter: blur(15px);
            border: 2px solid #00f6ff; 
            color: #00f6ff; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }
        .btn-outline:hover { background: rgba(0, 246, 255, 0.15); transform: translateY(-3px); box-shadow: 0 0 20px rgba(0, 246, 255, 0.4); }

        /* Specific styles for LinkedIn button */
        .btn-linkedin {
            background: rgba(10, 15, 25, 0.6);
            backdrop-filter: blur(15px);
            border: 2px solid #0077b5;
            color: #0077b5;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }
        .btn-linkedin:hover {
            background: #0077b5;
            color: #ffffff;
            transform: translateY(-3px);
            box-shadow: 0 0 20px rgba(0, 119, 181, 0.6);
        }

        .contact-icon {
            width: 22px;
            height: 22px;
            object-fit: contain;
        }

        /* Profile picture container styling */
        .hero-image {
            flex: 1;
            display: flex;
            justify-content: flex-end;
            padding-right: 20px;
        }

        .hex-wrapper {
            position: relative;
            width: 380px; height: 430px;
            display: flex; justify-content: center; align-items: center;
            animation: slowShake 2.5s ease-in-out infinite;
        }
        
        .hex-glow {
            position: absolute;
            width: 100%; height: 100%;
            background: #00f6ff;
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            filter: blur(25px);
            z-index: 1;
        }

        .hex-border {
            position: absolute;
            width: 98%; height: 98%;
            background: #00f6ff;
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            z-index: 2;
        }

        .hex-img {
            position: relative;
            width: 93%; height: 93%;
            object-fit: cover;
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            z-index: 3;
            background-color: #1a1d24; 
        }

        /* Rules for other sections (Experience, Skills, Projects) */
        section:not(#home) { padding: 100px 5% 60px; max-width: 1200px; margin: 0 auto; border-top: 1px solid rgba(255,255,255,0.05); }
        .section-title { text-align: center; font-size: 2.4em; margin-bottom: 50px; font-weight: 700; text-shadow: 0 4px 10px rgba(0,0,0,0.8); }
        .section-title span { color: #00f6ff; }

        /* Styling for the work experience timeline */
        .glass-card {
            background: linear-gradient(135deg, rgba(10, 15, 25, 0.6) 0%, rgba(10, 15, 25, 0.3) 100%);
            backdrop-filter: blur(25px); 
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-top: 1px solid rgba(255, 255, 255, 0.15); 
            border-left: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 16px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.6); 
            padding: 40px 30px;
        }

        .timeline-container { margin-top: 20px; }
        .timeline-item { display: flex; gap: 25px; margin-bottom: 35px; padding-bottom: 25px; border-bottom: 1px solid rgba(255,255,255,0.05); transition: 0.3s; }
        .timeline-item:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
        
        .company-logo { 
            width: 60px; height: 60px; 
            background: rgba(10, 15, 25, 0.8); 
            border-radius: 12px; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 1.2em; font-weight: 800; color: #00f6ff;
            flex-shrink: 0; 
            border: 1px solid rgba(0, 246, 255, 0.3);
            text-align: center; line-height: 1.2; box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
        }

        .exp-details h3 { font-size: 1.4em; margin: 0 0 5px; color: #00f6ff; }
        .exp-details h4 { font-size: 1.05em; color: #f8fafc; margin: 0 0 5px; }
        .exp-details .meta { font-size: 0.9em; color: #94a3b8; margin-bottom: 15px; display: inline-block; background: rgba(0,0,0,0.6); padding: 4px 10px; border-radius: 20px; }
